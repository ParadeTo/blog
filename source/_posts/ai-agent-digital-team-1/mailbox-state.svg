<svg xmlns="http://www.w3.org/2000/svg" width="700" height="240" viewBox="0 0 700 240" font-family="'PingFang SC', 'Microsoft YaHei', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#E53935"/>
    </marker>
  </defs>

  <!-- States -->
  <!-- unread -->
  <rect x="30" y="80" width="160" height="80" rx="12" fill="#E3F2FD" stroke="#1565C0" stroke-width="2.5"/>
  <text x="110" y="115" text-anchor="middle" font-size="16" font-weight="bold" fill="#1565C0">unread</text>
  <text x="110" y="138" text-anchor="middle" font-size="12" fill="#555">待处理</text>

  <!-- in_progress -->
  <rect x="270" y="80" width="160" height="80" rx="12" fill="#FFF8E1" stroke="#F57F17" stroke-width="2.5"/>
  <text x="350" y="115" text-anchor="middle" font-size="16" font-weight="bold" fill="#E65100">in_progress</text>
  <text x="350" y="138" text-anchor="middle" font-size="12" fill="#555">处理中</text>

  <!-- done -->
  <rect x="510" y="80" width="160" height="80" rx="12" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="590" y="115" text-anchor="middle" font-size="16" font-weight="bold" fill="#2E7D32">done</text>
  <text x="590" y="138" text-anchor="middle" font-size="12" fill="#555">已完成</text>

  <!-- send → unread label -->
  <text x="110" y="72" text-anchor="middle" font-size="12" fill="#1565C0">send()</text>
  <line x1="110" y1="55" x2="110" y2="79" stroke="#1565C0" stroke-width="1.5" marker-end="url(#arr)"/>
  <circle cx="110" cy="48" r="8" fill="#1565C0"/>

  <!-- unread → in_progress -->
  <line x1="190" y1="120" x2="268" y2="120" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="229" y="113" text-anchor="middle" font-size="12" fill="#555">read()</text>

  <!-- in_progress → done -->
  <line x1="430" y1="120" x2="508" y2="120" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="469" y="113" text-anchor="middle" font-size="12" fill="#555">done()</text>

  <!-- reset-stale: in_progress → unread (curved below) -->
  <path d="M 280 162 Q 190 210 160 162" stroke="#E53935" stroke-width="2" fill="none" marker-end="url(#arr-red)"/>
  <text x="215" y="210" text-anchor="middle" font-size="12" fill="#E53935">reset-stale()</text>
  <text x="215" y="225" text-anchor="middle" font-size="11" fill="#E53935">超时恢复</text>

  <!-- Label: SQS analogy -->
  <text x="350" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">三态邮箱状态机</text>
</svg>
