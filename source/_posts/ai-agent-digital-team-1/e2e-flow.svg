<svg xmlns="http://www.w3.org/2000/svg" width="740" height="420" viewBox="0 0 740 420" font-family="'PingFang SC', 'Microsoft YaHei', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-b" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#1565C0"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="370" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">端到端流程：Manager → PM → Manager</text>

  <!-- Step 1: node run-manager.js -->
  <rect x="20" y="55" width="700" height="95" rx="10" fill="#FFF3E0" stroke="#F9A825" stroke-width="2"/>
  <text x="40" y="80" font-size="13" font-weight="bold" fill="#E65100">Step 1　node run-manager.js　（任务分配模式）</text>
  <rect x="40" y="90" width="200" height="50" rx="6" fill="#fff" stroke="#F9A825" stroke-width="1.5"/>
  <text x="140" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Manager Agent</text>
  <text x="140" y="130" text-anchor="middle" font-size="11" fill="#555">workspace/manager/</text>

  <line x1="240" y1="115" x2="310" y2="115" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="275" y="108" text-anchor="middle" font-size="11" fill="#555">writeFile</text>

  <rect x="310" y="90" width="150" height="50" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="385" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">needs/</text>
  <text x="385" y="130" text-anchor="middle" font-size="11" fill="#555">requirements.md</text>

  <line x1="460" y1="115" x2="530" y2="115" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="495" y="108" text-anchor="middle" font-size="11" fill="#555">mailbox send</text>

  <rect x="530" y="90" width="170" height="50" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="615" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">mailboxes/pm.json</text>
  <text x="615" y="130" text-anchor="middle" font-size="11" fill="#555">task_assign → unread</text>

  <!-- Arrow to step 2 -->
  <line x1="370" y1="150" x2="370" y2="180" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: node run-pm.js -->
  <rect x="20" y="183" width="700" height="95" rx="10" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="40" y="208" font-size="13" font-weight="bold" fill="#1B5E20">Step 2　node run-pm.js　（读邮箱 + 执行任务）</text>
  <rect x="40" y="218" width="200" height="50" rx="6" fill="#fff" stroke="#388E3C" stroke-width="1.5"/>
  <text x="140" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">PM Agent</text>
  <text x="140" y="258" text-anchor="middle" font-size="11" fill="#555">workspace/pm/</text>

  <line x1="240" y1="243" x2="310" y2="243" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="275" y="236" text-anchor="middle" font-size="11" fill="#555">writeFile</text>

  <rect x="310" y="218" width="150" height="50" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="385" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">design/</text>
  <text x="385" y="258" text-anchor="middle" font-size="11" fill="#555">product_spec.md</text>

  <line x1="460" y1="243" x2="530" y2="243" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="495" y="236" text-anchor="middle" font-size="11" fill="#555">mailbox send</text>

  <rect x="530" y="218" width="170" height="50" rx="6" fill="#FFF3E0" stroke="#F9A825" stroke-width="1.5"/>
  <text x="615" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">mailboxes/manager.json</text>
  <text x="615" y="258" text-anchor="middle" font-size="11" fill="#555">task_done → unread</text>

  <!-- Arrow to step 3 -->
  <line x1="370" y1="278" x2="370" y2="308" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: node run-manager.js (review) -->
  <rect x="20" y="311" width="700" height="95" rx="10" fill="#EDE7F6" stroke="#7B1FA2" stroke-width="2"/>
  <text x="40" y="336" font-size="13" font-weight="bold" fill="#4A148C">Step 3　node run-manager.js　（验收模式）</text>
  <rect x="40" y="346" width="200" height="50" rx="6" fill="#fff" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="140" y="368" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Manager Agent</text>
  <text x="140" y="386" text-anchor="middle" font-size="11" fill="#555">检测到 task_done</text>

  <line x1="240" y1="371" x2="310" y2="371" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="275" y="364" text-anchor="middle" font-size="11" fill="#555">readFile</text>

  <rect x="310" y="346" width="150" height="50" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="385" y="368" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">product_spec.md</text>
  <text x="385" y="386" text-anchor="middle" font-size="11" fill="#555">逐项对照需求</text>

  <line x1="460" y1="371" x2="530" y2="371" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="495" y="364" text-anchor="middle" font-size="11" fill="#555">writeFile</text>

  <rect x="530" y="346" width="170" height="50" rx="6" fill="#EDE7F6" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="615" y="368" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">review_result.md</text>
  <text x="615" y="386" text-anchor="middle" font-size="11" fill="#555">验收报告</text>
</svg>
