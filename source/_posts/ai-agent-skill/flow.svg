<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="#1a1a2e">Skill 系统工作流程</text>

  <!-- Node: 用户输入 -->
  <rect x="330" y="60" width="140" height="44" rx="22" fill="#4361ee" filter="url(#shadow)"/>
  <text x="400" y="87" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="14" fill="#fff">用户输入</text>

  <!-- Arrow down -->
  <line x1="400" y1="104" x2="400" y2="134" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Node: Skill 检测（LLM） -->
  <rect x="280" y="134" width="240" height="52" rx="8" fill="#fff" stroke="#4361ee" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="158" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="13" fill="#333">Skill 检测（快速 LLM 调用）</text>
  <text x="400" y="178" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="11" fill="#888">根据 skill.description 判断意图</text>

  <!-- Arrow left: 无匹配 -->
  <line x1="280" y1="160" x2="160" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="218" y="152" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="11" fill="#888">无匹配</text>

  <!-- Arrow down: 有匹配 -->
  <line x1="400" y1="186" x2="400" y2="222" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="412" y="208" font-family="'PingFang SC', Arial, sans-serif" font-size="11" fill="#888">匹配到</text>

  <!-- Node: 加载 Skill 文件 -->
  <rect x="290" y="222" width="220" height="52" rx="8" fill="#fff" stroke="#7b2d8b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="246" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="13" fill="#333">加载 Skill 文件</text>
  <text x="400" y="266" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="11" fill="#888">读取 .md → 解析 prompt 内容</text>

  <!-- Arrow down -->
  <line x1="400" y1="274" x2="400" y2="308" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Node: 注入 System Prompt -->
  <rect x="280" y="308" width="240" height="52" rx="8" fill="#fff" stroke="#f72585" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="332" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="13" fill="#333">注入 System Prompt</text>
  <text x="400" y="352" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="11" fill="#888">将 skill 内容作为系统提示词</text>

  <!-- Node: 默认 System Prompt（左侧） -->
  <rect x="60" y="134" width="100" height="44" rx="8" fill="#f0f0f0" stroke="#aaa" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="110" y="155" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="12" fill="#555">默认 Prompt</text>
  <text x="110" y="171" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="11" fill="#888">通用助手</text>

  <!-- Arrow: 默认 Prompt → 注入 System Prompt -->
  <path d="M 110 178 L 110 334 L 280 334" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrow down -->
  <line x1="400" y1="360" x2="400" y2="394" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Node: 主 LLM 执行 -->
  <rect x="290" y="394" width="220" height="52" rx="8" fill="#fff" stroke="#4cc9f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="418" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="13" fill="#333">主 LLM 执行</text>
  <text x="400" y="438" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="11" fill="#888">携带 skill 语境回复用户</text>

  <!-- Skills panel on right -->
  <rect x="610" y="200" width="155" height="136" rx="8" fill="#fff8e1" stroke="#f0a500" stroke-width="1.2"/>
  <text x="687" y="222" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="12" font-weight="600" fill="#c47a00">skills/ 目录</text>
  <rect x="626" y="232" width="123" height="28" rx="5" fill="#fff3cd" stroke="#f0c040" stroke-width="1"/>
  <text x="687" y="251" text-anchor="middle" font-family="monospace" font-size="12" fill="#555">translate.md</text>
  <rect x="626" y="268" width="123" height="28" rx="5" fill="#fff3cd" stroke="#f0c040" stroke-width="1"/>
  <text x="687" y="287" text-anchor="middle" font-family="monospace" font-size="12" fill="#555">summarize.md</text>
  <rect x="626" y="304" width="123" height="20" rx="5" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="687" y="319" text-anchor="middle" font-family="monospace" font-size="11" fill="#aaa">...</text>

  <!-- Arrow from skills panel to 加载 Skill 文件 -->
  <line x1="610" y1="268" x2="510" y2="252" stroke="#f0a500" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
</svg>
