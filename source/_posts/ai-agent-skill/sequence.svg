<svg xmlns="http://www.w3.org/2000/svg" width="780" height="680" viewBox="0 0 780 680">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4361ee"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2d8b4e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="680" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="390" y="32" text-anchor="middle" font-family="'PingFang SC','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="600" fill="#1a1a2e">All-in-One 策略运行时序（3 轮对话）</text>

  <!-- Participants -->
  <rect x="60" y="50" width="80" height="32" rx="6" fill="#4361ee"/>
  <text x="100" y="71" text-anchor="middle" font-family="'PingFang SC',Arial,sans-serif" font-size="13" fill="#fff">User</text>

  <rect x="260" y="50" width="80" height="32" rx="6" fill="#7b2d8b"/>
  <text x="300" y="71" text-anchor="middle" font-family="'PingFang SC',Arial,sans-serif" font-size="13" fill="#fff">Agent</text>

  <rect x="440" y="50" width="120" height="32" rx="6" fill="#f72585"/>
  <text x="500" y="71" text-anchor="middle" font-family="'PingFang SC',Arial,sans-serif" font-size="13" fill="#fff">LLM（检测）</text>

  <rect x="630" y="50" width="120" height="32" rx="6" fill="#4cc9f0"/>
  <text x="690" y="71" text-anchor="middle" font-family="'PingFang SC',Arial,sans-serif" font-size="13" fill="#fff">LLM（执行）</text>

  <!-- Lifelines -->
  <line x1="100" y1="82" x2="100" y2="650" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="300" y1="82" x2="300" y2="650" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="500" y1="82" x2="500" y2="650" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="690" y1="82" x2="690" y2="650" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ═══ Round 1: 翻译 ═══ -->
  <rect x="20" y="98" width="740" height="178" rx="6" fill="#4361ee08" stroke="#4361ee" stroke-width="0.8" stroke-dasharray="6,3"/>
  <text x="34" y="116" font-family="'PingFang SC',Arial,sans-serif" font-size="11" font-weight="600" fill="#4361ee">Round 1</text>

  <!-- User → Agent -->
  <line x1="100" y1="130" x2="298" y2="130" stroke="#4361ee" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="200" y="124" text-anchor="middle" font-family="'PingFang SC',Arial,sans-serif" font-size="12" fill="#333">翻译"你好"</text>

  <!-- Agent → LLM detect -->
  <line x1="300" y1="155" x2="498" y2="155" stroke="#f72585" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="400" y="149" text-anchor="middle" font-family="'PingFang SC',Arial,sans-serif" font-size="11" fill="#666">system: 判断匹配哪个 skill...</text>

  <!-- LLM detect → Agent -->
  <line x1="498" y1="180" x2="302" y2="180" stroke="#f72585" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="400" y="174" text-anchor="middle" font-family="monospace" font-size="12" fill="#f72585" font-weight="600">translate</text>

  <!-- Agent → LLM execute -->
  <line x1="300" y1="210" x2="688" y2="210" stroke="#4cc9f0" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="495" y="204" text-anchor="middle" font-family="'PingFang SC',Arial,sans-serif" font-size="11" fill="#666">system: 你是一位专业翻译...</text>

  <!-- LLM execute → Agent -->
  <line x1="688" y1="235" x2="302" y2="235" stroke="#4cc9f0" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="495" y="229" text-anchor="middle" font-family="monospace" font-size="12" fill="#2d8b4e" font-weight="600">Hello</text>

  <!-- Agent → User -->
  <line x1="298" y1="265" x2="102" y2="265" stroke="#2d8b4e" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="200" y="259" text-anchor="middle" font-family="monospace" font-size="12" fill="#2d8b4e" font-weight="600">Hello</text>

  <!-- ═══ Round 2: 笑话 ═══ -->
  <rect x="20" y="286" width="740" height="168" rx="6" fill="#7b2d8b08" stroke="#7b2d8b" stroke-width="0.8" stroke-dasharray="6,3"/>
  <text x="34" y="304" font-family="'PingFang SC',Arial,sans-serif" font-size="11" font-weight="600" fill="#7b2d8b">Round 2</text>

  <!-- User → Agent -->
  <line x1="100" y1="318" x2="298" y2="318" stroke="#4361ee" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="200" y="312" text-anchor="middle" font-family="'PingFang SC',Arial,sans-serif" font-size="12" fill="#333">讲一个笑话</text>

  <!-- Agent → LLM detect -->
  <line x1="300" y1="343" x2="498" y2="343" stroke="#f72585" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="400" y="337" text-anchor="middle" font-family="'PingFang SC',Arial,sans-serif" font-size="11" fill="#666">system: 判断匹配哪个 skill...</text>

  <!-- LLM detect → Agent -->
  <line x1="498" y1="368" x2="302" y2="368" stroke="#f72585" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="400" y="362" text-anchor="middle" font-family="monospace" font-size="12" fill="#f72585" font-weight="600">none</text>

  <!-- Agent → LLM execute (default prompt) -->
  <line x1="300" y1="398" x2="688" y2="398" stroke="#4cc9f0" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="495" y="392" text-anchor="middle" font-family="'PingFang SC',Arial,sans-serif" font-size="11" fill="#666">system: 你是一个智能助手...</text>

  <!-- LLM execute → Agent -->
  <line x1="688" y1="423" x2="302" y2="423" stroke="#4cc9f0" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="495" y="417" text-anchor="middle" font-family="'PingFang SC',Arial,sans-serif" font-size="12" fill="#2d8b4e">一个人去图书馆...</text>

  <!-- Agent → User -->
  <line x1="298" y1="443" x2="102" y2="443" stroke="#2d8b4e" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="200" y="437" text-anchor="middle" font-family="'PingFang SC',Arial,sans-serif" font-size="12" fill="#2d8b4e">一个人去图书馆...</text>

  <!-- ═══ Round 3: 总结 ═══ -->
  <rect x="20" y="464" width="740" height="178" rx="6" fill="#4cc9f008" stroke="#4cc9f0" stroke-width="0.8" stroke-dasharray="6,3"/>
  <text x="34" y="482" font-family="'PingFang SC',Arial,sans-serif" font-size="11" font-weight="600" fill="#4cc9f0">Round 3</text>

  <!-- User → Agent -->
  <line x1="100" y1="498" x2="298" y2="498" stroke="#4361ee" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="200" y="492" text-anchor="middle" font-family="'PingFang SC',Arial,sans-serif" font-size="12" fill="#333">总结一下对话</text>

  <!-- Agent → LLM detect -->
  <line x1="300" y1="523" x2="498" y2="523" stroke="#f72585" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="400" y="517" text-anchor="middle" font-family="'PingFang SC',Arial,sans-serif" font-size="11" fill="#666">system: 判断匹配哪个 skill...</text>

  <!-- LLM detect → Agent -->
  <line x1="498" y1="548" x2="302" y2="548" stroke="#f72585" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="400" y="542" text-anchor="middle" font-family="monospace" font-size="12" fill="#f72585" font-weight="600">summarize</text>

  <!-- Agent → LLM execute -->
  <line x1="300" y1="578" x2="688" y2="578" stroke="#4cc9f0" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="495" y="572" text-anchor="middle" font-family="'PingFang SC',Arial,sans-serif" font-size="11" fill="#666">system: 你是一位摘要助手...</text>

  <!-- LLM execute → Agent -->
  <line x1="688" y1="603" x2="302" y2="603" stroke="#4cc9f0" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="495" y="597" text-anchor="middle" font-family="'PingFang SC',Arial,sans-serif" font-size="12" fill="#2d8b4e">• 翻译"你好"→Hello ...</text>

  <!-- Agent → User -->
  <line x1="298" y1="633" x2="102" y2="633" stroke="#2d8b4e" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="200" y="627" text-anchor="middle" font-family="'PingFang SC',Arial,sans-serif" font-size="12" fill="#2d8b4e">• 翻译"你好"→Hello ...</text>
</svg>
